<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Emoji Snake</title>
    <style>
        /* === BASE STYLES & VARIABLES === */
        :root {
            /* Blue (Default Fallback) */
            --bg-gradient: linear-gradient(135deg, #90e0ef 0%, #0077b6 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(255, 255, 255, 0.9);
            --panel-shadow: 0 15px 35px rgba(0, 30, 80, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.8);
            --text-color: #03045e;
            --snake-head: #ffb703;
            --snake-body: #fb8500;
            --btn-bg: linear-gradient(145deg, #caf0f8, #ade8f4);
            --btn-text: #03045e;
            --btn-shadow: 5px 5px 15px rgba(0, 119, 182, 0.3), -5px -5px 15px rgba(255,255,255,0.6);
            --btn-active: inset 5px 5px 10px rgba(0, 119, 182, 0.2), inset -5px -5px 10px rgba(255,255,255,0.6);
            --canvas-bg: rgba(255, 255, 255, 0.5);
        }

        [data-theme="nokia"] {
            /* Retro Nokia Theme */
            --bg-gradient: linear-gradient(135deg, #0a110a 0%, #1a241a 100%);
            --panel-bg: #9bc53b;
            --panel-border: #000;
            --panel-shadow: 10px 10px 0px rgba(0,0,0,0.8);
            --text-color: #111;
            --snake-head: #000;
            --snake-body: rgba(0,0,0,0.7);
            --btn-bg: #111;
            --btn-text: #9bc53b;
            --btn-shadow: 6px 6px 0px #000;
            --btn-active: inset 2px 2px 0px #000;
            --canvas-bg: transparent;
        }

        [data-theme="lavender"] {
            /* Lavender Theme */
            --bg-gradient: radial-gradient(circle at top right, #2e1065 0%, #0f172a 100%);
            --panel-bg: rgba(46, 16, 101, 0.5);
            --panel-border: rgba(139, 92, 246, 0.3);
            --panel-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
            --text-color: #ddd6fe;
            --snake-head: #c084fc;
            --snake-body: #8b5cf6;
            --btn-bg: linear-gradient(145deg, #4c1d95, #3b0764);
            --btn-text: #ddd6fe;
            --btn-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            --btn-active: inset 3px 3px 10px rgba(0,0,0,0.5);
            --canvas-bg: rgba(0, 0, 0, 0.2);
        }

        [data-theme="cyberpunk"] {
            /* Neon Cyberpunk Theme */
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --panel-bg: rgba(10, 10, 20, 0.85);
            --panel-border: #0ff;
            --panel-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 15px rgba(255, 0, 255, 0.2);
            --text-color: #fff;
            --snake-head: #0ff;
            --snake-body: #f0f;
            --btn-bg: #111;
            --btn-text: #0ff;
            --btn-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            --btn-active: inset 0 0 10px rgba(0, 255, 255, 0.8);
            --canvas-bg: rgba(5, 5, 10, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* === UI COMPONENTS === */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 750px; 
            height: 100vh;
            max-height: 1000px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 10px;
            animation: fadeIn 0.4s ease forwards;
        }
        .screen.active { display: flex; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--panel-border);
            border-radius: 24px;
            padding: 20px 25px;
            box-shadow: var(--panel-shadow);
            text-align: center;
            width: 100%;
            transition: all 0.3s ease;
        }

        [data-theme="nokia"] .glass-panel,
        [data-theme="nokia"] button {
            border-radius: 12px;
            backdrop-filter: none;
        }
        
        [data-theme="cyberpunk"] button {
            border: 1px solid var(--panel-border);
        }

        h1 { font-size: 2rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .full-width { grid-column: span 2; }

        .form-group { text-align: left; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.85rem; }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 2px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
            font-weight: bold;
        }
        select option { background: #333; color: #fff; }

        button {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all 0.1s ease;
            width: 100%;
        }
        button:active { box-shadow: var(--btn-active); transform: scale(0.96); }

        /* === GAME SCREEN === */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 16px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: var(--panel-shadow);
        }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: auto; padding: 8px 12px; margin: 0; font-size: 1.2rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lives-container { font-size: 1.2rem; letter-spacing: 3px; }

        [data-theme="nokia"] .game-header { border-radius: 12px; }

        .canvas-container {
            position: relative;
            border-radius: 20px;
            padding: 5px;
            background: var(--panel-bg);
            box-shadow: var(--panel-shadow);
            border: 2px solid var(--panel-border);
            width: 100%;
            display: flex;
            justify-content: center;
        }
        [data-theme="nokia"] .canvas-container { border-radius: 12px; }

        canvas {
            display: block;
            background: var(--canvas-bg);
            border-radius: 15px;
            width: 100%;
            max-width: 700px; 
            aspect-ratio: 1 / 1;
        }
        [data-theme="nokia"] canvas { border-radius: 0; }

        /* Controls UI */
        .controls-ui {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .controls-ui button {
            margin: 0; padding: 0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; width: 60px; height: 60px;
        }
        [data-theme="nokia"] .controls-ui button { border-radius: 12px; }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        /* === ANIMATIONS === */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake-small { animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        .shake-hard { animation: shake-hard 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-2px, 0, 0); }
            40%, 60% { transform: translate3d(2px, 0, 0); }
        }
        @keyframes shake-hard {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-5px, -5px, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(5px, 5px, 0); }
        }

        /* Modals */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(6px); z-index: 10;
        }
        .modal-overlay.active { display: flex; }

        .btn-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

<audio id="bg-music" src="background_music.mp3" loop></audio>

<div class="app-container" id="app" data-theme="nokia">
    
    <div id="menu-screen" class="screen active">
        <div class="glass-panel">
            <h1>Emoji Snake 🍎🥭</h1>
            
            <div class="settings-grid">
                <div class="form-group">
                    <label for="theme-select">Theme</label>
                    <select id="theme-select">
                        <option value="nokia" selected>Retro</option>
                        <option value="daylight">Blue</option>
                        <option value="lavender">Lavender</option>
                        <option value="cyberpunk">Neon Cyberpunk</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="snake-style-select">Snake Style</label>
                    <select id="snake-style-select">
                        <option value="rainbow-pipe" selected>Color Changing</option>
                        <option value="solid-pipe">Flowy</option>
                        <option value="rounded-square">Classic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="speed-select">Game Speed</label>
                    <select id="speed-select">
                        <option value="6">Slow</option>
                        <option value="11" selected>Normal</option>
                        <option value="16">Fast</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="control-select">Controls</label>
                    <select id="control-select">
                        <option value="both">Swipe + Buttons</option>
                        <option value="swipe">Swipe Only</option>
                        <option value="buttons">Buttons Only</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="enemy-mode-select">Enemy Snake</label>
                    <select id="enemy-mode-select">
                        <option value="off" selected>Off</option>
                        <option value="slow">Slow</option>
                        <option value="fast">Fast</option>
                    </select>
                </div>
            </div>

            <p style="margin-bottom: 10px; font-size: 1rem; font-weight:bold;">High Score: <span id="menu-highscore">0</span></p>
            <button id="start-btn" style="margin-top: 5px;">Start Game</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="header-buttons">
                <button id="btn-back-game" class="icon-btn" title="Return to Menu">🏠</button>
                <button id="btn-music-toggle" class="icon-btn" title="Toggle Music">🔊</button>
            </div>
            <div>Score: <span id="score">0</span></div>
            <div class="lives-container" id="lives">❤️❤️❤️</div>
        </div>

        <div class="canvas-container" id="canvas-wrapper">
            <canvas id="gameCanvas" width="700" height="700"></canvas>
        </div>

        <div class="controls-ui" id="controls-ui">
            <button class="btn-up" onclick="changeDirection(0, -1)">▲</button>
            <button class="btn-left" onclick="changeDirection(-1, 0)">◀</button>
            <button class="btn-right" onclick="changeDirection(1, 0)">▶</button>
            <button class="btn-down" onclick="changeDirection(0, 1)">▼</button>
        </div>
    </div>

    <div id="crash-modal" class="modal-overlay">
        <div class="glass-panel" style="width: 80%; max-width: 320px;">
            <h2 style="margin-bottom: 10px;">You Crashed!</h2>
            <p style="margin-bottom: 20px;">Chances left: <span id="chances-left-modal"></span></p>
            
            <div class="btn-group-vertical">
                <button id="btn-continue">Continue Playing</button>
                <button id="btn-restart-crash">Restart Game</button>
                <button id="btn-home-crash">Main Menu</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal-overlay">
        <div class="glass-panel" style="width: 80%; max-width: 320px;">
            <h2>Game Over 💀</h2>
            <p style="margin-bottom: 20px;">Final Score: <span id="final-score"></span></p>
            
            <div class="btn-group-vertical">
                <button id="btn-restart-over">Restart Game</button>
                <button id="btn-home-over">Main Menu</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- VARIABLES & STATE ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const app = document.getElementById("app");
    const canvasWrapper = document.getElementById("canvas-wrapper");
    const bgMusic = document.getElementById("bg-music");
    
    let tileCount = 28; 
    let tileSize = canvas.width / tileCount; 
    
    // Player
    let headX = 14, headY = 14;
    let snakeParts = [];
    let tailLength = 2;
    
    // Enemy
    let enemyMode = "off"; 
    let enemyX = 2, enemyY = 2;
    let enemyParts = [];
    let enemyTailLength = 4; 
    let enemyMoveTick = 0;   
    let enemyXV = 1, enemyYV = 0; // Tracks enemy direction to prevent sudden 180s
    
    // Food
    let appleX = 5, appleY = 5;
    let mangoActive = false;
    let mangoX = -1, mangoY = -1;
    
    // Game
    let xVelocity = 0, yVelocity = 0;
    let score = 0;
    let highScore = localStorage.getItem("snakeHighScore") || 0;
    let chances = 3;
    let gameLoop;
    let baseSpeed = 11;
    let currentSpeed = 11; 
    
    let isGameOver = false;
    let currentControls = "both";
    let currentSnakeStyle = "rainbow-pipe";
    let rainbowHue = 0; 
    let isMusicPlaying = false;
    
    document.getElementById("menu-highscore").innerText = highScore;

    // Set Initial Theme
    document.getElementById("theme-select").addEventListener("change", (e) => {
        app.setAttribute("data-theme", e.target.value);
    });
    document.getElementById("theme-select").value = "nokia";
    app.setAttribute("data-theme", "nokia");

    // --- AUDIO CONTROLS ---
    document.getElementById("btn-music-toggle").addEventListener("click", () => {
        if(isMusicPlaying) {
            bgMusic.pause();
            isMusicPlaying = false;
            document.getElementById("btn-music-toggle").innerText = "🔇";
        } else {
            bgMusic.play().catch(e => console.log("Audio blocked", e));
            isMusicPlaying = true;
            document.getElementById("btn-music-toggle").innerText = "🔊";
        }
    });

    // --- HELPER: HAPTIC FEEDBACK ---
    function triggerHaptic(ms) {
        if (navigator.vibrate) {
            try { navigator.vibrate(ms); } catch (e) {}
        }
    }

    document.getElementById("start-btn").addEventListener("click", () => {
        currentControls = document.getElementById("control-select").value;
        currentSnakeStyle = document.getElementById("snake-style-select").value;
        baseSpeed = parseInt(document.getElementById("speed-select").value);
        enemyMode = document.getElementById("enemy-mode-select").value;
        
        const controlsUI = document.getElementById("controls-ui");
        if (currentControls === "swipe") {
            controlsUI.style.display = "none";
        } else {
            controlsUI.style.display = "grid";
        }

        document.getElementById("menu-screen").classList.remove("active");
        document.getElementById("game-screen").classList.add("active");
        
        // Start Music
        bgMusic.play().then(() => {
            isMusicPlaying = true;
            document.getElementById("btn-music-toggle").innerText = "🔊";
        }).catch(e => {
            console.log("Autoplay blocked by browser. User must toggle manually.");
            isMusicPlaying = false;
            document.getElementById("btn-music-toggle").innerText = "🔇";
        });

        resetGame(true);
    });

    const closeModals = () => {
        document.getElementById("crash-modal").classList.remove("active");
        document.getElementById("game-over-modal").classList.remove("active");
    };

    const goHome = () => {
        clearTimeout(gameLoop);
        closeModals();
        document.getElementById("game-screen").classList.remove("active");
        document.getElementById("menu-screen").classList.add("active");
        document.getElementById("menu-highscore").innerText = highScore;
        
        // Pause music on menu
        bgMusic.pause();
        isMusicPlaying = false;
    };
    
    document.getElementById("btn-back-game").addEventListener("click", goHome);
    document.getElementById("btn-home-crash").addEventListener("click", goHome);
    document.getElementById("btn-home-over").addEventListener("click", goHome);
    
    document.getElementById("btn-restart-crash").addEventListener("click", () => { closeModals(); resetGame(true); });
    document.getElementById("btn-restart-over").addEventListener("click", () => { closeModals(); resetGame(true); });

    document.getElementById("btn-continue").addEventListener("click", () => { closeModals(); resetGame(false); });


    // --- GAME LOGIC ---
    function resetGame(fullReset = true) {
        if (fullReset) {
            chances = 3;
            score = 0;
            currentSpeed = baseSpeed;
        } 
        
        tailLength = 2;
        snakeParts = []; 
        headX = 14; 
        headY = 14; 
        
        // Enemy Reset
        enemyX = 2;
        enemyY = 2;
        enemyParts = [];
        enemyMoveTick = 0;
        enemyXV = 1;
        enemyYV = 0;
        
        // AUTOSTART
        xVelocity = 1;
        yVelocity = 0;
        
        isGameOver = false;
        mangoActive = false;
        
        updateUI();
        placeFood(true); 
        clearTimeout(gameLoop);
        drawGame();
    }

    function drawGame() {
        if (isGameOver) return;
        
        changeSnakePosition();
        handleEnemyMovement();
        
        let result = isGameOverCheck();
        if (result) return;

        clearScreen();
        checkFoodCollision(); 
        drawFood();
        if(enemyMode !== "off") drawEnemy();
        drawSnake();

        currentSpeed = baseSpeed + Math.floor(score / 6);
        gameLoop = setTimeout(drawGame, 1000 / currentSpeed);
    }

    function clearScreen() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius, fillStyle) {
        ctx.fillStyle = fillStyle;
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
    }

    // --- ENEMY LOGIC (Improved AI with Momentum) ---
    function handleEnemyMovement() {
        if (enemyMode === "off") return;
        
        enemyMoveTick++;
        let threshold = (enemyMode === "fast") ? 2 : 4; 
        
        if (enemyMoveTick >= threshold) {
            enemyMoveTick = 0;
            
            let options = [
                { dx: 1, dy: 0 },
                { dx: -1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: 0, dy: -1 }
            ];

            let validMoves = [];

            for (let opt of options) {
                // Prevent sudden 180 degree turns to stop jittering
                if (enemyParts.length > 0 && opt.dx === -enemyXV && opt.dy === -enemyYV) continue;

                let nx = enemyX + opt.dx;
                let ny = enemyY + opt.dy;

                // Wall collision check
                if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount) continue;

                // Self collision check
                let hitSelf = enemyParts.some(part => part.x === nx && part.y === ny);
                if (hitSelf) continue;

                validMoves.push({ x: nx, y: ny, dx: opt.dx, dy: opt.dy });
            }

            if (validMoves.length > 0) {
                // Sort to find the move that gets closest to the player
                validMoves.forEach(m => {
                    m.dist = Math.abs(m.x - headX) + Math.abs(m.y - headY);
                });
                validMoves.sort((a, b) => a.dist - b.dist);

                let bestMove = validMoves[0];
                enemyX = bestMove.x;
                enemyY = bestMove.y;
                enemyXV = bestMove.dx;
                enemyYV = bestMove.dy;
            }
        }
    }

    function drawEnemy() {
        let eBody = "#ef233c";
        let eHead = "#d90429";

        for (let i = 0; i < enemyParts.length; i++) {
            let part = enemyParts[i];
            drawRoundedRect(ctx, part.x * tileSize + 2, part.y * tileSize + 2, tileSize - 4, tileSize - 4, 8, eBody);
        }
        drawRoundedRect(ctx, enemyX * tileSize + 2, enemyY * tileSize + 2, tileSize - 4, tileSize - 4, 10, eHead);

        enemyParts.push(new SnakePart(enemyX, enemyY));
        while (enemyParts.length > enemyTailLength) {
            enemyParts.shift();
        }
    }

    // --- PLAYER DRAWING ---
    function drawSnake() {
        const rootStyles = getComputedStyle(document.documentElement);
        let bodyColor = String(rootStyles.getPropertyValue('--snake-body')).trim() || "#00b4d8";
        let headColor = String(rootStyles.getPropertyValue('--snake-head')).trim() || "#ff477e";
        
        if (app.getAttribute("data-theme") === "nokia") {
            bodyColor = "rgba(0,0,0,0.7)";
            headColor = "#000";
        }
        
        rainbowHue = (rainbowHue + 10) % 360;

        if (currentSnakeStyle === "solid-pipe" || currentSnakeStyle === "rainbow-pipe") {
            ctx.lineWidth = tileSize - 4;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";

            if (snakeParts.length > 0) {
                if (currentSnakeStyle === "solid-pipe") {
                    ctx.beginPath();
                    ctx.strokeStyle = bodyColor;
                    ctx.moveTo(snakeParts[0].x * tileSize + tileSize/2, snakeParts[0].y * tileSize + tileSize/2);
                    for (let i = 1; i < snakeParts.length; i++) {
                        ctx.lineTo(snakeParts[i].x * tileSize + tileSize/2, snakeParts[i].y * tileSize + tileSize/2);
                    }
                    ctx.lineTo(headX * tileSize + tileSize/2, headY * tileSize + tileSize/2);
                    ctx.stroke();

                    ctx.fillStyle = headColor;
                    ctx.beginPath();
                    ctx.arc(headX * tileSize + tileSize/2, headY * tileSize + tileSize/2, tileSize/2 - 1, 0, Math.PI*2);
                    ctx.fill();

                } else if (currentSnakeStyle === "rainbow-pipe") {
                    let prevX = snakeParts[0].x * tileSize + tileSize/2;
                    let prevY = snakeParts[0].y * tileSize + tileSize/2;

                    for (let i = 1; i < snakeParts.length; i++) {
                        let currX = snakeParts[i].x * tileSize + tileSize/2;
                        let currY = snakeParts[i].y * tileSize + tileSize/2;
                        
                        ctx.beginPath();
                        ctx.strokeStyle = `hsl(${(rainbowHue + i * 15) % 360}, 100%, 55%)`;
                        ctx.moveTo(prevX, prevY);
                        ctx.lineTo(currX, currY);
                        ctx.stroke();
                        
                        prevX = currX;
                        prevY = currY;
                    }

                    let hX = headX * tileSize + tileSize/2;
                    let hY = headY * tileSize + tileSize/2;
                    
                    ctx.beginPath();
                    ctx.strokeStyle = `hsl(${(rainbowHue + snakeParts.length * 15) % 360}, 100%, 55%)`;
                    ctx.moveTo(prevX, prevY);
                    ctx.lineTo(hX, hY);
                    ctx.stroke();

                    ctx.fillStyle = `hsl(${(rainbowHue + (snakeParts.length + 2) * 15) % 360}, 100%, 65%)`;
                    ctx.beginPath();
                    ctx.arc(hX, hY, tileSize/2 - 1, 0, Math.PI*2);
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = currentSnakeStyle === "rainbow-pipe" ? `hsl(${rainbowHue}, 100%, 55%)` : headColor;
                ctx.beginPath();
                ctx.arc(headX * tileSize + tileSize/2, headY * tileSize + tileSize/2, tileSize/2 - 1, 0, Math.PI*2);
                ctx.fill();
            }
            
        } 
        else if (currentSnakeStyle === "rounded-square") {
            ctx.fillStyle = bodyColor;
            for (let i = 0; i < snakeParts.length; i++) {
                let part = snakeParts[i];
                drawRoundedRect(ctx, part.x * tileSize + 2, part.y * tileSize + 2, tileSize - 4, tileSize - 4, 8, bodyColor);
            }
            drawRoundedRect(ctx, headX * tileSize + 2, headY * tileSize + 2, tileSize - 4, tileSize - 4, 10, headColor);
        }

        snakeParts.push(new SnakePart(headX, headY));
        while (snakeParts.length > tailLength) {
            snakeParts.shift();
        }
    }

    class SnakePart {
        constructor(x, y) { this.x = x; this.y = y; }
    }

    function changeSnakePosition() {
        headX += xVelocity;
        headY += yVelocity;
    }

    function drawFood() {
        ctx.font = `${tileSize * 0.85}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        ctx.fillText('🍎', appleX * tileSize + tileSize/2, appleY * tileSize + tileSize/2);
        
        if (mangoActive) {
            ctx.fillText('🥭', mangoX * tileSize + tileSize/2, mangoY * tileSize + tileSize/2);
        }
    }

    function checkFoodCollision() {
        if (appleX === headX && appleY === headY) {
            placeFood(true); 
            if (!mangoActive && Math.random() < 0.20) {
                placeFood(false); 
            }
            tailLength++;
            score++;
            updateUI();
            triggerHaptic(50); 
            
            canvasWrapper.classList.remove("shake-small");
            void canvasWrapper.offsetWidth; 
            canvasWrapper.classList.add("shake-small");
        }

        if (mangoActive && mangoX === headX && mangoY === headY) {
            mangoActive = false; 
            tailLength += 2; 
            score += 2;      
            updateUI();
            triggerHaptic([40, 30, 60]); 
            
            canvasWrapper.classList.remove("shake-small");
            void canvasWrapper.offsetWidth; 
            canvasWrapper.classList.add("shake-small");
        }
    }

    function getEmptyPosition() {
        let valid = false;
        let x, y;
        while (!valid) {
            x = Math.floor(Math.random() * tileCount);
            y = Math.floor(Math.random() * tileCount);
            valid = true;
            for(let part of snakeParts) {
                if(part.x === x && part.y === y) valid = false;
            }
            if(headX === x && headY === y) valid = false;
            if(appleX === x && appleY === y) valid = false;
            if(mangoX === x && mangoY === y) valid = false;
            if(enemyMode !== "off" && enemyX === x && enemyY === y) valid = false; 
        }
        return {x, y};
    }

    function placeFood(isApple) {
        let pos = getEmptyPosition();
        if (isApple) {
            appleX = pos.x;
            appleY = pos.y;
        } else {
            mangoActive = true;
            mangoX = pos.x;
            mangoY = pos.y;
        }
    }

    function isGameOverCheck() {
        let gameOver = false;

        // Player hits walls
        if (headX < 0 || headX >= tileCount || headY < 0 || headY >= tileCount) {
            gameOver = true;
        }

        // Player hits self
        if(xVelocity !== 0 || yVelocity !== 0) {
            for (let i = 0; i < snakeParts.length; i++) {
                let part = snakeParts[i];
                if (part.x === headX && part.y === headY) {
                    gameOver = true;
                    break;
                }
            }
        }

        // --- ENEMY COLLISIONS ---
        if (enemyMode !== "off") {
            for (let part of enemyParts) {
                if (headX === part.x && headY === part.y) gameOver = true;
            }
            if (headX === enemyX && headY === enemyY) gameOver = true;
            
            for (let part of snakeParts) {
                if (enemyX === part.x && enemyY === part.y) gameOver = true;
            }
        }

        if (gameOver) {
            isGameOver = true;
            triggerHaptic(300); 
            
            canvasWrapper.classList.remove("shake-hard");
            void canvasWrapper.offsetWidth;
            canvasWrapper.classList.add("shake-hard");

            handleDeath();
        }
        return gameOver;
    }

    function handleDeath() {
        chances--;
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
        }
        updateUI();

        setTimeout(() => {
            if (chances > 0) {
                document.getElementById("chances-left-modal").innerText = chances;
                document.getElementById("crash-modal").classList.add("active");
            } else {
                showGameOver();
            }
        }, 500);
    }

    function showGameOver() {
        document.getElementById("final-score").innerText = score;
        document.getElementById("game-over-modal").classList.add("active");
    }

    function updateUI() {
        document.getElementById("score").innerText = score;
        let hearts = "";
        for(let i=0; i<chances; i++) hearts += "❤️";
        for(let i=chances; i<3; i++) hearts += "🖤"; 
        document.getElementById("lives").innerText = hearts;
    }

    // --- INPUT CONTROLS ---
    function changeDirection(xv, yv) {
        if (xv === 1 && xVelocity === -1) return;
        if (xv === -1 && xVelocity === 1) return;
        if (yv === 1 && yVelocity === -1) return;
        if (yv === -1 && yVelocity === 1) return;
        
        xVelocity = xv;
        yVelocity = yv;
        
        triggerHaptic(15);
    }

    document.body.addEventListener("keydown", (e) => {
        if(isGameOver) return;
        if (e.key === "ArrowUp" || e.key === "w") changeDirection(0, -1);
        if (e.key === "ArrowDown" || e.key === "s") changeDirection(0, 1);
        if (e.key === "ArrowLeft" || e.key === "a") changeDirection(-1, 0);
        if (e.key === "ArrowRight" || e.key === "d") changeDirection(1, 0);
    });

    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        if (currentControls === "buttons" || isGameOver) return;
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (currentControls === "buttons" || isGameOver) return;
        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;
        handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
    }, {passive: true});

    function handleSwipe(startX, startY, endX, endY) {
        let diffX = endX - startX;
        let diffY = endY - startY;
        
        if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) return;

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 0) changeDirection(1, 0); 
            else changeDirection(-1, 0);
        } else {
            if (diffY > 0) changeDirection(0, 1); 
            else changeDirection(0, -1); 
        }
    }

    document.getElementById("game-screen").addEventListener("touchmove", (e) => {
        if(currentControls !== "buttons") e.preventDefault();
    }, { passive: false });

</script>
