name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Delete broken template files
        run: rm -rf app/src/main/java/com/example/androidWebViewOfflineApplication/ui
        working-directory: ./02.AndroidWebviewOfflineAppTemplate

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./02.AndroidWebviewOfflineAppTemplate

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: ./02.AndroidWebviewOfflineAppTemplate

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Snake-Game-Release-APK
          path: 02.AndroidWebviewOfflineAppTemplate/app/build/outputs/apk/release/*.apk
